# Provide the Actions' name
name: Job Output and dependencies
on:
    push:
        branches:
            - 'hotfix/*'
    pull_request:
        branches:
            - 'main'
    workflow_dispatch:
      
jobs:
    generate-info:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v6
          - name: job purpose
            run: echo "Generating repository information..."
          - name: Set output for date and commit SHA
            id: generate
            run: |
                CURRENT_DATE=$(date +%c)
                LATEST_COMMIT_ID=$(git rev-parse --short=6 HEAD)
                LATEST_COMMIT_ID=$(GITHUB_SHA::6)
                echo "$Build at $CURRENT_DATE"
                echo "Build commit ref -> $LATEST_COMMIT_ID"



    
             
          

              





